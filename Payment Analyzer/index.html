<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Analyzer</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <h1>Payment Analyzer</h1>

    <div class="field">
      <label for="endpoint">Endpoint URL</label>
      <input type="text" id="endpoint" placeholder="https://.../generateContent" />
    </div>

    <div class="field">
      <label for="token">Bearer Token</label>
      <input type="text" id="token" placeholder="ya29.a0AfH6..." autocomplete="off" />
    </div>

    <div class="field">
      <label for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="Paste the payment message here&hellip;"></textarea>
    </div>

    <div class="field">
      <label for="temperature">Temperature: <span id="temperatureValue">0.20</span></label>
      <input type="range" id="temperature" min="0" max="1" step="0.01" value="0.2" />
    </div>

    <div class="field">
      <label for="sysInstructionSelect">System Instruction</label>
      <select id="sysInstructionSelect"></select>
      <div class="row">
        <button id="newInstructionBtn" type="button" class="secondary">New</button>
        <button id="saveInstructionBtn" type="button" class="secondary">Save</button>
        <button id="deleteInstructionBtn" type="button" class="secondary">Delete</button>
      </div>
      <textarea id="sysInstructionText" placeholder="System instruction for the selected format&hellip;"></textarea>
    </div>

    <button id="sendBtn">Send</button>

    <div class="field">
      <label for="formatted">Response</label>
      <div id="formatted" class="markdown-box"></div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
